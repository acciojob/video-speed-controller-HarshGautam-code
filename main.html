<!DOCTYPE html>
<html lang="en">

  <meta charset="UTF-8">

<body>

	<div class="player">

  <!-- Video -->
  <video class="viewer" 
    src="https://www.w3schools.com/html/mov_bbb.mp4">
  </video>

  <!-- Controls -->
  <div class="controls">

    <!-- Play / Pause -->
    <button class="player__button toggle">►</button>

    <!-- Progress Bar -->
    <div class="progress">
      <div class="progress__filled"></div>
    </div>

    <!-- Skip Buttons -->
    <button data-skip="-10" class="skip">« 10s</button>
    <button data-skip="25" class="skip">25s »</button>

    <!-- Volume -->
    <input type="range" name="volume" min="0" max="1" step="0.05" value="1">

    <!-- Playback Speed -->
    <input type="range" name="playbackRate" min="0.5" max="2" step="0.1" value="1">

  </div>

</div>

<script  src="./script.js">
  //Your code goes here
</script>
</body>
</html>
